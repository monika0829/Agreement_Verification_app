<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agreement Verification Application</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app"></div>
    
    <script>
        // API Configuration
        const API_BASE = 'https://ds537u232p80.drytis.ai/api/v1';
        // For local testing: const API_BASE = 'https://ds537u232p80.drytis.ai/api/v1';

        // State
        let currentPage = 'login';
        let token = localStorage.getItem('access_token');
        let user = JSON.parse(localStorage.getItem('user') || 'null');

        // Router
        function navigate(page) {
            currentPage = page;
            render();
        }

        // API Helper
        async function apiCall(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers
            });

            if (response.status === 401) {
                logout();
                return null;
            }

            return response;
        }

        // Auth Functions
        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    token = data.access;
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    
                    // Get user info
                    const userResponse = await apiCall('/users/');
                    const userData = await userResponse.json();
                    user = userData.results[0];
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    navigate('dashboard');
                } else {
                    showError(data.detail || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function logout() {
            token = null;
            user = null;
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
            navigate('login');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }
        }

        // Load Functions
        async function loadVendors() {
            const response = await apiCall('/vendors/');
            const data = await response.json();
            return data.results || [];
        }

        async function loadAgreements() {
            const response = await apiCall('/agreements/');
            const data = await response.json();
            return data.results || [];
        }

        async function loadInvoices() {
            const response = await apiCall('/invoices/');
            const data = await response.json();
            return data.results || [];
        }

        async function loadVerifications() {
            const response = await apiCall('/verifications/');
            const data = await response.json();
            return data.results || [];
        }

        // Render Functions
        function render() {
            const app = document.getElementById('app');
            
            if (currentPage === 'login' && token) {
                navigate('dashboard');
                return;
            }

            if (currentPage === 'login') {
                app.innerHTML = renderLogin();
            } else if (!token) {
                navigate('login');
                return;
            } else {
                app.innerHTML = renderLayout() + renderPage();
                attachEventListeners();
            }
        }

        function renderLogin() {
            return `
                <div class="login-page">
                    <div class="login-container">
                        <div class="login-box">
                            <div class="login-header">
                                <h1>🤝 Agreement Verification</h1>
                                <p>Sign in to your account</p>
                            </div>
                            <div id="error-message" class="error-message"></div>
                            <form onsubmit="login(event)" class="login-form">
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" placeholder="admin@example.com" required>
                                </div>
                                <div class="form-group">
                                    <label for="password">Password</label>
                                    <input type="password" id="password" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="login-btn">Sign In</button>
                            </form>
                            <div class="login-footer">
                                <p>Default: admin@example.com / Admin123!</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLayout() {
            return `
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2>🤝 Agreement Verify</h2>
                    </div>
                    <nav class="sidebar-nav">
                        <a href="#" onclick="navigate('dashboard'); return false;" class="nav-item ${currentPage === 'dashboard' ? 'active' : ''}">
                            📊 Dashboard
                        </a>
                        <a href="#" onclick="navigate('vendors'); return false;" class="nav-item ${currentPage === 'vendors' ? 'active' : ''}">
                            🏢 Vendors
                        </a>
                        <a href="#" onclick="navigate('agreements'); return false;" class="nav-item ${currentPage === 'agreements' ? 'active' : ''}">
                            📄 Agreements
                        </a>
                        <a href="#" onclick="navigate('invoices'); return false;" class="nav-item ${currentPage === 'invoices' ? 'active' : ''}">
                            🧾 Invoices
                        </a>
                        <a href="#" onclick="navigate('verifications'); return false;" class="nav-item ${currentPage === 'verifications' ? 'active' : ''}">
                            ✓ Verifications
                        </a>
                    </nav>
                    <div class="sidebar-footer">
                        <div class="user-info">
                            <span>👤 ${user?.email || 'User'}</span>
                            <small>${user?.role || ''}</small>
                        </div>
                        <button onclick="logout()" class="logout-btn">Logout</button>
                    </div>
                </aside>
                <main class="main-content">
                    <header class="top-bar">
                        <h1>${getPageTitle()}</h1>
                    </header>
                    <div class="content" id="page-content"></div>
                </main>
            `;
        }

        function getPageTitle() {
            const titles = {
                'dashboard': 'Dashboard',
                'vendors': 'Vendors',
                'agreements': 'Agreements',
                'invoices': 'Invoices',
                'verifications': 'Verifications'
            };
            return titles[currentPage] || 'Dashboard';
        }

        async function renderPage() {
            const content = document.getElementById('page-content');
            
            switch(currentPage) {
                case 'dashboard':
                    content.innerHTML = '<div class="loading">Loading dashboard...</div>';
                    content.innerHTML = await renderDashboard();
                    break;
                case 'vendors':
                    content.innerHTML = '<div class="loading">Loading vendors...</div>';
                    content.innerHTML = await renderVendors();
                    break;
                case 'agreements':
                    content.innerHTML = '<div class="loading">Loading agreements...</div>';
                    content.innerHTML = await renderAgreements();
                    break;
                case 'invoices':
                    content.innerHTML = '<div class="loading">Loading invoices...</div>';
                    content.innerHTML = await renderInvoices();
                    break;
                case 'verifications':
                    content.innerHTML = '<div class="loading">Loading verifications...</div>';
                    content.innerHTML = await renderVerifications();
                    break;
            }
            attachEventListeners();
        }

        async function renderDashboard() {
            const [vendors, agreements, invoices, verifications] = await Promise.all([
                loadVendors(), loadAgreements(), loadInvoices(), loadVerifications()
            ]);

            return `
                <div class="dashboard">
                    <div class="dashboard-header">
                        <h2>Dashboard Overview</h2>
                        <p>Welcome back, ${user?.first_name || 'User'}!</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card vendors">
                            <div class="stat-icon">🏢</div>
                            <div class="stat-info">
                                <h3>${vendors.length}</h3>
                                <p>Total Vendors</p>
                            </div>
                        </div>
                        <div class="stat-card agreements">
                            <div class="stat-icon">📄</div>
                            <div class="stat-info">
                                <h3>${agreements.length}</h3>
                                <p>Agreements</p>
                            </div>
                        </div>
                        <div class="stat-card invoices">
                            <div class="stat-icon">🧾</div>
                            <div class="stat-info">
                                <h3>${invoices.length}</h3>
                                <p>Invoices</p>
                            </div>
                        </div>
                        <div class="stat-card verifications">
                            <div class="stat-icon">✓</div>
                            <div class="stat-info">
                                <h3>${verifications.length}</h3>
                                <p>Verifications</p>
                            </div>
                        </div>
                    </div>
                    <div class="dashboard-content">
                        <div class="quick-actions-card">
                            <h3>Quick Actions</h3>
                            <button onclick="navigate('vendors')" class="action-btn">➕ Add Vendor</button>
                            <button onclick="navigate('agreements')" class="action-btn">📝 New Agreement</button>
                            <button onclick="navigate('invoices')" class="action-btn">📤 Upload Invoice</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function renderVendors() {
            const vendors = await loadVendors();
            
            return `
                <div class="vendors-page">
                    <div class="page-header">
                        <h2>Vendors</h2>
                        <button class="btn btn-primary" onclick="showVendorModal()">➕ Add Vendor</button>
                    </div>
                    ${vendors.length === 0 ? '<div class="empty-state"><p>No vendors found. Add your first vendor!</p></div>' : ''}
                    <div class="vendors-grid">
                        ${vendors.map(v => `
                            <div class="vendor-card">
                                <div class="vendor-header">
                                    <h3>${v.name}</h3>
                                    <span class="status-badge ${v.is_active ? 'active' : 'inactive'}">${v.is_active ? 'Active' : 'Inactive'}</span>
                                </div>
                                <div class="vendor-details">
                                    <p><strong>Code:</strong> ${v.vendor_code}</p>
                                    <p><strong>Email:</strong> ${v.email}</p>
                                    <p><strong>Phone:</strong> ${v.phone}</p>
                                    <p><strong>Location:</strong> ${v.city}, ${v.state}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div id="vendor-modal"></div>
            `;
        }

        async function renderAgreements() {
            const agreements = await loadAgreements();
            
            return `
                <div class="agreements-page">
                    <div class="page-header">
                        <h2>Agreements</h2>
                    </div>
                    ${agreements.length === 0 ? '<div class="empty-state"><p>No agreements found.</p></div>' : ''}
                    <div class="data-table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Agreement #</th>
                                    <th>Title</th>
                                    <th>Status</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${agreements.map(a => `
                                    <tr>
                                        <td>${a.agreement_number}</td>
                                        <td>${a.title}</td>
                                        <td><span class="status-badge">${a.status}</span></td>
                                        <td>${a.agreement_start_date}</td>
                                        <td>${a.agreement_end_date}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        async function renderInvoices() {
            const invoices = await loadInvoices();
            
            return `
                <div class="invoices-page">
                    <div class="page-header">
                        <h2>Invoices</h2>
                        <button class="btn btn-primary" onclick="showUploadModal()">📤 Upload Invoice</button>
                    </div>
                    ${invoices.length === 0 ? '<div class="empty-state"><p>No invoices found.</p></div>' : ''}
                    <div class="data-table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Invoice #</th>
                                    <th>Vendor</th>
                                    <th>Total Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${invoices.map(i => `
                                    <tr>
                                        <td>${i.invoice_number}</td>
                                        <td>${i.vendor_name || '-'}</td>
                                        <td>$${parseFloat(i.total_amount).toFixed(2)}</td>
                                        <td><span class="status-badge">${i.status}</span></td>
                                        <td>
                                            ${i.status === 'PENDING' ? `<button class="btn btn-small btn-primary" onclick="verifyInvoice(${i.id})">Verify</button>` : ''}
                                            ${i.status === 'VERIFIED' ? `<button class="btn btn-small btn-success" onclick="approveInvoice(${i.id})">Approve</button>` : ''}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="upload-modal"></div>
            `;
        }

        async function renderVerifications() {
            const verifications = await loadVerifications();
            
            return `
                <div class="verifications-page">
                    <div class="page-header">
                        <h2>Verifications</h2>
                    </div>
                    ${verifications.length === 0 ? '<div class="empty-state"><p>No verifications found.</p></div>' : ''}
                    <div class="verifications-list">
                        ${verifications.map(v => `
                            <div class="verification-card">
                                <div class="verification-header">
                                    <h3>${v.title}</h3>
                                    <span class="status-badge">${v.status}</span>
                                </div>
                                <div class="verification-details">
                                    <p><strong>Reference:</strong> ${v.reference_number}</p>
                                    <p><strong>Type:</strong> ${v.request_type}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Event Handlers
        async function verifyInvoice(id) {
            if (confirm('Verify this invoice?')) {
                await apiCall(`/invoices/${id}/verify/`, { method: 'POST' });
                renderPage();
            }
        }

        async function approveInvoice(id) {
            await apiCall(`/invoices/${id}/approve/`, { method: 'POST' });
            renderPage();
        }

        function showVendorModal() {
            document.getElementById('vendor-modal').innerHTML = `
                <div class="modal-overlay" onclick="this.parentElement.innerHTML=''">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <h3>Add Vendor</h3>
                            <button class="close-btn" onclick="document.getElementById('vendor-modal').innerHTML=''">×</button>
                        </div>
                        <form onsubmit="saveVendor(event)" class="modal-body">
                            <div class="form-group">
                                <label>Vendor Code *</label>
                                <input type="text" id="vendor_code" required>
                            </div>
                            <div class="form-group">
                                <label>Name *</label>
                                <input type="text" id="vendor_name" required>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" id="vendor_email" required>
                            </div>
                            <div class="form-group">
                                <label>Phone *</label>
                                <input type="tel" id="vendor_phone" required>
                            </div>
                            <div class="form-group">
                                <label>Address *</label>
                                <input type="text" id="vendor_address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>City *</label>
                                    <input type="text" id="vendor_city" required>
                                </div>
                                <div class="form-group">
                                    <label>State *</label>
                                    <input type="text" id="vendor_state" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" onclick="document.getElementById('vendor-modal').innerHTML=''">Cancel</button>
                                <button type="submit" class="btn btn-primary">Create Vendor</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        async function saveVendor(e) {
            e.preventDefault();
            const data = {
                vendor_code: document.getElementById('vendor_code').value,
                name: document.getElementById('vendor_name').value,
                email: document.getElementById('vendor_email').value,
                phone: document.getElementById('vendor_phone').value,
                address: document.getElementById('vendor_address').value,
                city: document.getElementById('vendor_city').value,
                state: document.getElementById('vendor_state').value,
                country: 'USA'
            };

            await apiCall('/vendors/', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            document.getElementById('vendor-modal').innerHTML = '';
            renderPage();
        }

        function attachEventListeners() {
            // Re-attach any dynamic event listeners
        }

        // Initial render
        render();
    </script>
</body>
</html>
